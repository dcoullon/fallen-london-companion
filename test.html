    body {
      background: #12100a;
      color: #cdbf99;
      font-family: Georgia, serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 {
      font-size: 22px;
      color: #e8d5a0;
      border-bottom: 1px solid #3a2e1e;
      padding-bottom: 10px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #6b5a3e;
      font-size: 13px;
      margin-bottom: 32px;
    }
    h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b7355;
      margin: 32px 0 8px;
      border-bottom: 1px solid #2a2015;
      padding-bottom: 4px;
    }

    /* ── Duplicate-key audit ── */
    .audit-box {
      background: #1a1208;
      border: 1px solid #3a2e1e;
      padding: 12px 16px;
      border-radius: 3px;
      margin-bottom: 32px;
      font-size: 13px;
    }
    .audit-pass { border-color: #3a6e3a; }
    .audit-fail { border-color: #c47a7a; }
    .audit-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: #6b5a3e; }
    .dup-item { color: #c47a7a; margin: 2px 0; }

    /* ── Test cases ── */
    .test-case {
      background: #1a1208;
      border: 1px solid #2a2015;
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .test-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 14px;
      background: #1e1810;
      border-bottom: 1px solid #2a2015;
    }
    .test-name { font-size: 15px; color: #e8d5a0; flex: 1; }
    .test-desc { font-size: 12px; color: #6b5a3e; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-pass { background: #1e3a1e; color: #7ab87a; border: 1px solid #3a6e3a; }
    .badge-fail { background: #3a1e1e; color: #c47a7a; border: 1px solid #6e3a3a; }
    .badge-warn { background: #3a2e10; color: #e8c87a; border: 1px solid #6e5e20; }

    .test-body { padding: 12px 14px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 10px;
    }
    th {
      text-align: left;
      color: #6b5a3e;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-bottom: 1px solid #2a2015;
    }
    th.right { text-align: right; }
    tr:hover td { background: #1e1c14; }
    td {
      padding: 5px 8px;
      border-bottom: 1px solid #1e1810;
      vertical-align: top;
    }
    .col-item { color: #cdbf99; }
    .col-qty  { color: #8b7355; text-align: right; font-variant-numeric: tabular-nums; }
    .col-dir  { text-align: center; font-size: 11px; }
    .col-echo { text-align: right; font-variant-numeric: tabular-nums; }

    .gained   { color: #7ab87a; }
    .lost     { color: #c47a7a; }
    .unpriced { color: #6b5a3e; font-style: italic; }
    .flag-missing { color: #e8c87a; font-size: 11px; margin-left: 6px; }

    .net-line {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding-top: 6px;
      border-top: 1px solid #2a2015;
      font-size: 13px;
    }
    .net-label { color: #6b5a3e; }
    .net-value { font-weight: bold; font-variant-numeric: tabular-nums; }
    .net-pos { color: #7ab87a; }
    .net-neg { color: #c47a7a; }
    .net-zero { color: #8b7355; }

    .no-things {
      color: #6b5a3e;
      font-style: italic;
      font-size: 13px;
      padding: 4px 0;
    }

    .verdict-note {
      font-size: 12px;
      color: #6b5a3e;
      margin-top: 8px;
    }
    .verdict-note strong { color: #8b7355; }

    /* raw JSON toggle */
    details { margin-top: 10px; }
    summary {
      font-size: 11px;
      color: #6b5a3e;
      cursor: pointer;
      user-select: none;
    }
    summary:hover { color: #8b7355; }
    pre {
      margin: 6px 0 0;
      font-size: 11px;
      color: #6b5a3e;
      background: #12100a;
      border: 1px solid #1e1810;
      padding: 8px 10px;
      border-radius: 2px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* summary row at top */
    .summary-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .summary-card {
      background: #1a1208;
      border: 1px solid #2a2015;
      border-radius: 3px;
      padding: 10px 16px;
      font-size: 13px;
      min-width: 120px;
    }
    .summary-card .val { font-size: 22px; font-weight: bold; color: #e8d5a0; display: block; margin-bottom: 2px; }
    .summary-card .lbl { font-size: 11px; color: #6b5a3e; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-card.all-pass .val { color: #7ab87a; }
    .summary-card.has-fail .val { color: #c47a7a; }
    .summary-card.has-warn .val { color: #e8c87a; }
  </style>
</head>

// parseChanges — copied verbatim from extension/content.js
// ═══════════════════════════════════════════════════════════════════════════
function parseChanges(data) {
  if (!data || !Array.isArray(data.messages)) return [];

  const changes = [];
  for (const msg of data.messages) {
    if (!msg.possession) continue;
    // Allow non-Thing items (Progress, Status, etc.) only if explicitly priced
    if (msg.possession.nature !== "Thing" && PRICES[msg.possession.id] == null) continue;

    let gained, qty;

    if (msg.type === "StandardQualityChangeMessage") {
      if (msg.changeType !== "Decreased" && msg.changeType !== "Increased") continue;
      gained = msg.changeType === "Decreased"; // API changeType is inverted
      const match = msg.message.match(/([\d,]+) x /);
      if (!match) continue;
      qty = parseInt(match[1].replace(/,/g, ""), 10);
    } else if (msg.type === "QualityExplicitlySetMessage") {
      // First-time gain from zero — "You now have N x Item", N equals the amount gained.
      const match = msg.message.match(/([\d,]+) x /);
      if (!match) continue;
      qty = parseInt(match[1].replace(/,/g, ""), 10);
      gained = true;
    } else {
      continue;
    }

    const { id, name } = msg.possession;
    const unitPrice = PRICES[id] ?? null;
    const echoValue = unitPrice !== null ? qty * unitPrice * (gained ? 1 : -1) : null;

    changes.push({ name, id, qty, gained, unitPrice, echoValue });
  }
  return changes;
}

// ═══════════════════════════════════════════════════════════════════════════
// parseSaturation — copied verbatim from extension/content.js
// ═══════════════════════════════════════════════════════════════════════════
function parseSaturation(data) {
  if (!data || !Array.isArray(data.messages)) return null;
  for (const msg of data.messages) {
    if (msg.possession && msg.possession.name === "Rat Market Saturation") {
      return msg.possession.level ?? null;
    }
  }
  return null;
}

// Audit: detect duplicate keys in the PRICES literal at parse time
// (JS silently overwrites them; we re-scan the source text)
// ═══════════════════════════════════════════════════════════════════════════
function auditDuplicateKeys() {
  // Walk all numeric keys we can derive from the object; we can't re-scan
  // JS source at runtime, so we embed a parallel duplicate list manually.
  // The known duplicate is id 477.
  const knownDuplicates = [
    { id: 477, name: "F.F. Gebrandt's Superior Laudanum",
      note: "Was listed under both CURIOSITY and SUSTENANCE. SUSTENANCE entry removed in content.js fix." }
  ];
  return knownDuplicates;
}

// Run tests + render
// ═══════════════════════════════════════════════════════════════════════════
function fmtEcho(val) {
  const abs = Math.abs(val);
  const formatted = abs >= 1000
    ? abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    : abs.toFixed(2);
  return (val >= 0 ? "+" : "−") + formatted;
}

function renderAudit() {
  const dups = auditDuplicateKeys();
  const box = document.createElement("div");
  box.className = "audit-box " + (dups.length === 0 ? "audit-pass" : "audit-fail");

  const label = document.createElement("div");
  label.className = "audit-label";
  label.textContent = "PRICES table duplicate-key audit";
  box.appendChild(label);

  if (dups.length === 0) {
    const ok = document.createElement("div");
    ok.style.color = "#7ab87a";
    ok.textContent = "No duplicate keys detected.";
    box.appendChild(ok);
  } else {
    const intro = document.createElement("div");
    intro.style.color = "#c47a7a";
    intro.style.marginBottom = "6px";
    intro.textContent = `${dups.length} duplicate key(s) found (last definition wins in JS — fixed in content.js):`;
    box.appendChild(intro);
    for (const d of dups) {
      const row = document.createElement("div");
      row.className = "dup-item";
      row.innerHTML = `<strong>ID ${d.id}</strong> — ${d.name}: ${d.note}`;
      box.appendChild(row);
    }
  }
  return box;
}

function renderTest(fixture) {
  const changes = parseChanges(fixture.data);
  const verdict = fixture.passCondition(changes);
  const pricedChanges = changes.filter(c => c.echoValue !== null);
  const unpricedChanges = changes.filter(c => c.echoValue === null);
  const net = pricedChanges.reduce((s, c) => s + c.echoValue, 0);

  const section = document.createElement("div");
  section.className = "test-case";

  // Header
  const header = document.createElement("div");
  header.className = "test-header";

  const nameEl = document.createElement("span");
  nameEl.className = "test-name";
  nameEl.textContent = fixture.label;

  const descEl = document.createElement("span");
  descEl.className = "test-desc";
  descEl.textContent = fixture.name + ".json";

  const badge = document.createElement("span");
  badge.className = "badge " + (verdict.ok ? "badge-pass" : "badge-fail");
  badge.textContent = verdict.ok ? "PASS" : "FAIL";

  header.appendChild(nameEl);
  header.appendChild(descEl);
  header.appendChild(badge);
  section.appendChild(header);

  // Body
  const body = document.createElement("div");
  body.className = "test-body";

  // Description
  const descP = document.createElement("div");
  descP.style.cssText = "font-size:12px;color:#6b5a3e;margin-bottom:10px;line-height:1.5";
  descP.textContent = fixture.description;
  body.appendChild(descP);

  if (changes.length === 0) {
    const none = document.createElement("div");
    none.className = "no-things";
    none.textContent = "No Thing changes detected in this fixture.";
    body.appendChild(none);
  } else {
    // Item table
    const table = document.createElement("table");
    table.innerHTML = `
      <thead><tr>
        <th>Item</th>
        <th>ID</th>
        <th class="right">Qty</th>
        <th>Direction</th>
        <th class="right">Unit price</th>
        <th class="right">Echo value</th>
      </tr></thead>`;
    const tbody = document.createElement("tbody");

    for (const c of changes) {
      const tr = document.createElement("tr");
      const dirClass = c.gained ? "gained" : "lost";
      const dirLabel = c.gained ? "GAINED" : "LOST";
      const missingFlag = (c.echoValue === null)
        ? `<span class="flag-missing">[unpriced]</span>` : "";
      const echoCell = c.echoValue !== null
        ? `<span class="${dirClass}">${fmtEcho(c.echoValue)}</span>`
        : `<span class="unpriced">—</span>`;
      const unitCell = c.unitPrice !== null
        ? `<span style="color:#8b7355">${c.unitPrice.toFixed(4)}</span>`
        : `<span class="unpriced">—</span>`;
      tr.innerHTML = `
        <td class="col-item">${c.name}${missingFlag}</td>
        <td class="col-qty" style="color:#6b5a3e;text-align:left">${c.id}</td>
        <td class="col-qty">${c.qty.toLocaleString()}</td>
        <td class="col-dir"><span class="${dirClass}">${dirLabel}</span></td>
        <td class="col-echo">${unitCell}</td>
        <td class="col-echo">${echoCell}</td>`;
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    body.appendChild(table);

    // Net total line
    const netLine = document.createElement("div");
    netLine.className = "net-line";
    const netClass = net > 0 ? "net-pos" : net < 0 ? "net-neg" : "net-zero";
    const unpricedNote = unpricedChanges.length > 0
      ? `<span style="color:#6b5a3e;font-size:0.85em;margin-left:6px">(+${unpricedChanges.length} unpriced item${unpricedChanges.length > 1 ? "s" : ""})</span>`
      : "";
    netLine.innerHTML = `
      <span class="net-label">Net total:</span>
      <span class="net-value ${netClass}">${fmtEcho(net)} echoes</span>
      ${unpricedNote}`;
    body.appendChild(netLine);
  }

  // Fail reason
  if (!verdict.ok) {
    const reason = document.createElement("div");
    reason.style.cssText = "margin-top:10px;padding:8px 10px;background:#2a1414;border:1px solid #6e3a3a;border-radius:2px;font-size:12px;color:#c47a7a";
    reason.innerHTML = `<strong>Failure reason:</strong> ${verdict.reason}`;
    body.appendChild(reason);
  }

  // Expected values note
  const expNote = document.createElement("div");
  expNote.className = "verdict-note";
  const expItems = fixture.expectedItems.map(e =>
    `${e.name} (${e.gained ? "+" : "−"}${Math.abs(e.echoValue).toFixed(2)})`
  ).join(", ");
  const expNet = fixture.expectedNet;
  const expNetClass = expNet >= 0 ? "net-pos" : "net-neg";
  expNote.innerHTML = `<strong>Expected:</strong> ${expItems} &nbsp;|&nbsp; Net: <span class="${expNetClass}">${fmtEcho(expNet)} echoes</span>`;
  body.appendChild(expNote);

  // Raw JSON toggle
  const details = document.createElement("details");
  const summary = document.createElement("summary");
  summary.textContent = "Show raw fixture JSON";
  const pre = document.createElement("pre");
  pre.textContent = JSON.stringify(fixture.data, null, 2);
  details.appendChild(summary);
  details.appendChild(pre);
  body.appendChild(details);

  section.appendChild(body);
  return { el: section, passed: verdict.ok };
}

function satTierLabel(level) {
  if (level === null) return "—";
  if (level <= 65000)  return "32% boost";
  if (level <= 180000) return "12% boost";
  return "no boost";
}

function renderSaturationTest(fixture) {
  const level = parseSaturation(fixture.data);
  const verdict = fixture.passCondition(level);

  const section = document.createElement("div");
  section.className = "test-case";

  const header = document.createElement("div");
  header.className = "test-header";

  const nameEl = document.createElement("span");
  nameEl.className = "test-name";
  nameEl.textContent = fixture.label;

  const badge = document.createElement("span");
  badge.className = "badge " + (verdict.ok ? "badge-pass" : "badge-fail");
  badge.textContent = verdict.ok ? "PASS" : "FAIL";

  header.appendChild(nameEl);
  header.appendChild(badge);
  section.appendChild(header);

  const body = document.createElement("div");
  body.className = "test-body";

  const descP = document.createElement("div");
  descP.style.cssText = "font-size:12px;color:#6b5a3e;margin-bottom:10px;line-height:1.5";
  descP.textContent = fixture.description;
  body.appendChild(descP);

  const resultLine = document.createElement("div");
  resultLine.style.cssText = "font-size:13px;margin-bottom:8px";
  const levelStr = level !== null ? level.toLocaleString() : "null";
  const tier = satTierLabel(level);
  let html = `<strong>parseSaturation result:</strong> <code style="color:#e8d5a0">${levelStr}</code>`;
  if (level !== null) html += ` → <span style="color:#c9a84c">${tier}</span>`;
  resultLine.innerHTML = html;
  body.appendChild(resultLine);

  const expNote = document.createElement("div");
  expNote.className = "verdict-note";
  const expStr = fixture.expectedLevel !== null ? fixture.expectedLevel.toLocaleString() : "null";
  expNote.innerHTML = `<strong>Expected level:</strong> ${expStr}`;
  body.appendChild(expNote);

  if (!verdict.ok) {
    const reason = document.createElement("div");
    reason.style.cssText = "margin-top:10px;padding:8px 10px;background:#2a1414;border:1px solid #6e3a3a;border-radius:2px;font-size:12px;color:#c47a7a";
    reason.innerHTML = `<strong>Failure reason:</strong> ${verdict.reason}`;
    body.appendChild(reason);
  }

  section.appendChild(body);
  return { el: section, passed: verdict.ok };
}

// Build page
window.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById("main");

  // Audit section
  const auditH2 = document.createElement("h2");
  auditH2.textContent = "Price Table Integrity";
  container.appendChild(auditH2);
  container.appendChild(renderAudit());

  const results = [];

  // parseChanges tests
  const casesH2 = document.createElement("h2");
  casesH2.textContent = "parseChanges Tests";
  container.appendChild(casesH2);

  for (const fixture of fixtures) {
    const { el, passed } = renderTest(fixture);
    container.appendChild(el);
    results.push(passed);
  }

  // parseSaturation tests
  const satH2 = document.createElement("h2");
  satH2.textContent = "parseSaturation Tests";
  container.appendChild(satH2);

  for (const fixture of saturationFixtures) {
    const { el, passed } = renderSaturationTest(fixture);
    container.appendChild(el);
    results.push(passed);
  }

  // Summary bar
  const passCount = results.filter(Boolean).length;
  const failCount = results.length - passCount;
  const summaryBar = document.getElementById("summary-bar");

  const totalCard = document.createElement("div");
  totalCard.className = "summary-card";
  totalCard.innerHTML = `<span class="val">${results.length}</span><span class="lbl">Test cases</span>`;

  const passCard = document.createElement("div");
  passCard.className = "summary-card " + (failCount === 0 ? "all-pass" : "");
  passCard.innerHTML = `<span class="val" style="color:#7ab87a">${passCount}</span><span class="lbl">Passed</span>`;

  const failCard = document.createElement("div");
  failCard.className = "summary-card " + (failCount > 0 ? "has-fail" : "all-pass");
  failCard.innerHTML = `<span class="val" style="color:${failCount > 0 ? "#c47a7a" : "#7ab87a"}">${failCount}</span><span class="lbl">Failed</span>`;

  const priceCount = Object.keys(PRICES).length;
  const priceCard = document.createElement("div");
  priceCard.className = "summary-card";
  priceCard.innerHTML = `<span class="val">${priceCount}</span><span class="lbl">Priced items</span>`;

  summaryBar.appendChild(totalCard);
  summaryBar.appendChild(passCard);
  summaryBar.appendChild(failCard);
  summaryBar.appendChild(priceCard);
});
