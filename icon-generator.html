<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FL Companion — Icon Options</title>
  <style>
    body {
      background: #12100a;
      color: #e8d5a0;
      font-family: Georgia, serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    h1 { color: #e8d5a0; font-size: 20px; border-bottom: 1px solid #3a2e1e; padding-bottom: 10px; margin-bottom: 6px; }
    p.note { color: #6b5a3e; font-size: 13px; margin-bottom: 28px; }
    .options { display: flex; gap: 24px; flex-wrap: wrap; }
    .option {
      background: #1a1208;
      border: 1px solid #2a2015;
      border-radius: 4px;
      padding: 20px 24px;
      text-align: center;
      min-width: 190px;
    }
    .option h2 { color: #c9a84c; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 18px; }
    .previews { display: flex; gap: 16px; align-items: flex-end; justify-content: center; margin-bottom: 18px; }
    .preview-wrap { text-align: center; }
    .preview-wrap span { display: block; color: #6b5a3e; font-size: 10px; margin-top: 5px; }
    canvas { display: block; }
    .downloads { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    button {
      background: #2a2015;
      border: 1px solid #6b5a3e;
      color: #c9a84c;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 11px;
      border-radius: 2px;
      font-family: Georgia, serif;
    }
    button:hover { background: #3a3020; border-color: #c9a84c; }
  </style>
</head>
<body>

<h1>Fallen London Companion — Icon Options</h1>
<p class="note">
  Four designs shown at 128×128 (store listing), 48×48 (extensions page), and 16×16 (toolbar).<br>
  Click a download button to save the PNG — you need all three sizes.
  Save them to <code>extension/icons/</code> as <code>icon128.png</code>, <code>icon48.png</code>, <code>icon16.png</code>.
</p>

<div class="options" id="options"></div>

<script>
// ── Utility ───────────────────────────────────────────────────────────────

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Option A: "FL" gold monogram on dark ─────────────────────────────────

function drawA(ctx, s) {
  ctx.fillStyle = '#0e0c07';
  ctx.fillRect(0, 0, s, s);

  const pad = Math.round(s * 0.07);
  const r   = Math.round(s * 0.15);

  ctx.fillStyle = '#191408';
  roundRect(ctx, pad, pad, s - pad * 2, s - pad * 2, r);
  ctx.fill();

  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = Math.max(1, s * 0.045);
  roundRect(ctx, pad, pad, s - pad * 2, s - pad * 2, r);
  ctx.stroke();

  ctx.fillStyle = '#e8d5a0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(s * 0.46)}px Georgia, serif`;
  ctx.fillText('FL', s / 2, s / 2 + s * 0.025);
}

// ── Option B: Candle flame ────────────────────────────────────────────────

function drawB(ctx, s) {
  ctx.fillStyle = '#0e0c07';
  ctx.fillRect(0, 0, s, s);

  const cx = s / 2;
  const cy = s * 0.60; // top of candle body

  // Glow behind flame
  const glow = ctx.createRadialGradient(cx, cy - s * 0.28, 0, cx, cy - s * 0.28, s * 0.30);
  glow.addColorStop(0, 'rgba(220, 160, 40, 0.30)');
  glow.addColorStop(1, 'rgba(220, 160, 40, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy - s * 0.28, s * 0.30, 0, Math.PI * 2);
  ctx.fill();

  // Flame body
  ctx.fillStyle = '#e8a030';
  ctx.beginPath();
  ctx.moveTo(cx, cy - s * 0.06);
  ctx.bezierCurveTo(cx + s * 0.12, cy - s * 0.20, cx + s * 0.10, cy - s * 0.44, cx, cy - s * 0.54);
  ctx.bezierCurveTo(cx - s * 0.10, cy - s * 0.44, cx - s * 0.12, cy - s * 0.20, cx, cy - s * 0.06);
  ctx.fill();

  // Flame inner highlight
  ctx.fillStyle = '#fff8c0';
  ctx.beginPath();
  ctx.moveTo(cx, cy - s * 0.10);
  ctx.bezierCurveTo(cx + s * 0.04, cy - s * 0.20, cx + s * 0.04, cy - s * 0.36, cx, cy - s * 0.44);
  ctx.bezierCurveTo(cx - s * 0.04, cy - s * 0.36, cx - s * 0.04, cy - s * 0.20, cx, cy - s * 0.10);
  ctx.fill();

  // Wick
  ctx.strokeStyle = '#6b5a3e';
  ctx.lineWidth = Math.max(1, s * 0.025);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, cy - s * 0.06);
  ctx.stroke();

  // Candle body
  const cw = s * 0.24;
  const ch = s * 0.28;
  ctx.fillStyle = '#d4c48a';
  ctx.fillRect(cx - cw / 2, cy, cw, ch);

  // Candle top edge
  ctx.fillStyle = '#ede3b0';
  ctx.fillRect(cx - cw / 2, cy, cw, s * 0.03);

  // Candle shadow side
  ctx.fillStyle = '#a89660';
  ctx.fillRect(cx + cw * 0.3, cy, cw * 0.2, ch);
}

// ── Option C: Bat silhouette (gold on dark) ───────────────────────────────

function drawC(ctx, s) {
  ctx.fillStyle = '#0e0c07';
  ctx.fillRect(0, 0, s, s);

  const cx = s / 2;
  const cy = s * 0.52;

  // Subtle amber glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, s * 0.42);
  glow.addColorStop(0, 'rgba(201,168,76,0.15)');
  glow.addColorStop(1, 'rgba(201,168,76,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, s * 0.42, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#c9a84c';
  ctx.save();
  ctx.translate(cx, cy);
  const k = s / 128;

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 4 * k, 7 * k, 10 * k, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(0, -9 * k, 7 * k, 7 * k, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  function ear(side) {
    ctx.beginPath();
    ctx.moveTo(side * 4 * k, -13 * k);
    ctx.lineTo(side * 11 * k, -25 * k);
    ctx.lineTo(side * 1 * k, -15 * k);
    ctx.fill();
  }
  ear(-1); ear(1);

  // Wings
  function wing(side) {
    ctx.beginPath();
    ctx.moveTo(side * 6 * k, -2 * k);
    ctx.bezierCurveTo(side * 20 * k, -18 * k, side * 46 * k, -8 * k, side * 53 * k, 6 * k);
    ctx.bezierCurveTo(side * 38 * k, 4 * k, side * 22 * k, 10 * k, side * 9 * k, 16 * k);
    ctx.bezierCurveTo(side * 8 * k, 8 * k, side * 7 * k, 2 * k, side * 6 * k, -2 * k);
    ctx.fill();
  }
  wing(-1); wing(1);

  // Wing membrane lines
  ctx.strokeStyle = '#0e0c07';
  ctx.lineWidth = k * 1.2;
  [[8, 0, 33, -4], [8, 3, 44, 5]].forEach(([x1, y1, x2, y2]) => {
    ctx.beginPath(); ctx.moveTo(-x1 * k, y1 * k); ctx.lineTo(-x2 * k, y2 * k); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1 * k, y1 * k); ctx.lineTo(x2 * k, y2 * k); ctx.stroke();
  });

  ctx.restore();
}

// ── Option D: Amber circle with echo "Ē" mark ────────────────────────────

function drawD(ctx, s) {
  ctx.fillStyle = '#0e0c07';
  ctx.fillRect(0, 0, s, s);

  const cx = s / 2;
  const cy = s / 2;
  const r  = s * 0.37;

  // Outer glow
  const glow = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, r * 1.2);
  glow.addColorStop(0, 'rgba(201,168,76,0.35)');
  glow.addColorStop(1, 'rgba(201,168,76,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Circle fill
  ctx.fillStyle = '#191408';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Circle border
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = Math.max(1, s * 0.05);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  // "Ē" — E with macron (the in-game echo symbol)
  ctx.fillStyle = '#e8d5a0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(s * 0.44)}px Georgia, serif`;
  ctx.fillText('\u0112', cx, cy + s * 0.025);
}

// ── Assemble page ─────────────────────────────────────────────────────────

const OPTIONS = [
  { id: 'A', label: 'FL Monogram',  draw: drawA },
  { id: 'B', label: 'Candle',       draw: drawB },
  { id: 'C', label: 'Bat',          draw: drawC },
  { id: 'D', label: 'Echo Mark Ē',  draw: drawD },
];

const SIZES = [128, 48, 16];

function makeCanvas(size, drawFn) {
  const c = document.createElement('canvas');
  c.width  = size;
  c.height = size;
  drawFn(c.getContext('2d'), size);
  return c;
}

function triggerDownload(canvas, filename) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

const container = document.getElementById('options');

for (const opt of OPTIONS) {
  const div = document.createElement('div');
  div.className = 'option';

  const h2 = document.createElement('h2');
  h2.textContent = `Option ${opt.id} — ${opt.label}`;
  div.appendChild(h2);

  const previews = document.createElement('div');
  previews.className = 'previews';

  const canvases = {};
  for (const size of SIZES) {
    const wrap = document.createElement('div');
    wrap.className = 'preview-wrap';
    const c = makeCanvas(size, opt.draw);
    // Scale up smaller canvases for visibility, pixelated so you see true sharpness
    if (size < 128) {
      const display = size === 48 ? 48 : 32;
      c.style.width  = display + 'px';
      c.style.height = display + 'px';
      c.style.imageRendering = 'pixelated';
    }
    canvases[size] = c;
    const label = document.createElement('span');
    label.textContent = size + 'px';
    wrap.appendChild(c);
    wrap.appendChild(label);
    previews.appendChild(wrap);
  }
  div.appendChild(previews);

  const btns = document.createElement('div');
  btns.className = 'downloads';
  for (const size of SIZES) {
    const btn = document.createElement('button');
    btn.textContent = `↓ ${size}px`;
    btn.addEventListener('click', () => triggerDownload(canvases[size], `icon${size}.png`));
    btns.appendChild(btn);
  }
  div.appendChild(btns);
  container.appendChild(div);
}
</script>

</body>
</html>
